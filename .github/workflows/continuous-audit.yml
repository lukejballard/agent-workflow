name: Continuous Audit

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  python-audit:
    name: Python audit signals
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Flakiness smoke rerun
        run: |
          echo "## Python flakiness smoke" >> $GITHUB_STEP_SUMMARY
          for run in 1 2; do
            echo "Run $run" >> $GITHUB_STEP_SUMMARY
            pytest tests/unit -q --maxfail=1 >> $GITHUB_STEP_SUMMARY 2>&1 || true
          done

      - name: Dependency drift snapshot
        run: |
          echo "## Python dependency audit" >> $GITHUB_STEP_SUMMARY
          pip-audit >> $GITHUB_STEP_SUMMARY 2>&1 || true

  frontend-audit:
    name: Frontend audit signals
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit snapshot
        run: |
          echo "## Frontend dependency audit" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high >> $GITHUB_STEP_SUMMARY 2>&1 || true

      - name: Test rerun smoke
        run: |
          echo "## Frontend test rerun smoke" >> $GITHUB_STEP_SUMMARY
          for run in 1 2; do
            echo "Run $run" >> $GITHUB_STEP_SUMMARY
            npm run test >> $GITHUB_STEP_SUMMARY 2>&1 || true
          done

  docs-audit:
    name: Documentation and link health
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown link syntax and workflow docs presence
        run: |
          echo "## Documentation audit" >> $GITHUB_STEP_SUMMARY
          find docs .github -name "*.md" | sort >> $GITHUB_STEP_SUMMARY
          if [ ! -f docs/runbooks/agent-mode.md ] || [ ! -f docs/copilot-setup.md ]; then
            echo "Missing core workflow docs" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Check research brief directory
        run: |
          echo "## Research brief directory" >> $GITHUB_STEP_SUMMARY
          ls -la docs/specs/research >> $GITHUB_STEP_SUMMARY 2>&1 || true