name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-governance:
    name: Repo governance and hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate agent-platform metadata
        run: python scripts/agent/sync_agent_platform.py --check

      - name: Validate Python helper scripts
        run: python -m compileall scripts/agent

      - name: Validate shell helper syntax
        run: |
          bash -n scripts/agent/verify-narrow.sh
          bash -n scripts/agent/verify-broad.sh

      - name: Naming hygiene
        run: |
          ! grep -RInE --exclude=ci.yml "baseball[-]biomechanics[-]ai|pipeline[-]observe|pipeline[_]observe|practitioner[-]runtime[-]bootstrap[-]v1|practitioner[-]session[-]review[-]and[-]prescription[-]v1|biomechanics[-]ai[-]video[-]vertical[-]slice[-]v1|dashboard[-]zero[-]pipeline[-]empty[-]state|docs/pipeline[-]studio[.]md" AGENTS.md docs/architecture.md docs/product-direction.md docs/quickstart.md docs/runbooks docs/integrations docs/images .github/agents .github/instructions .github/agent-platform scripts/agent .vscode frontend/AGENTS.md src/AGENTS.md tests/AGENTS.md .specify/memory/constitution.md skills

      - name: SAST (semgrep)
        if: hashFiles('src/**/*.py') != ''
        run: |
          pip install semgrep --quiet
          semgrep --config .semgrep.yml src/ --error

      - name: Validate eval task corpus
        if: hashFiles('evals/tasks/*.json') != ''
        run: python evals/run_evals.py --dry-run

      - name: Spec checklist completeness
        run: python scripts/agent/check_spec_checklist.py

      - name: Workflow phase transition coverage
        run: python -m compileall scripts/agent/workflow_phases.py -q

      - name: Orchestrator progressive context loading contract
        run: python scripts/agent/check_context_loading.py

      - name: Compile agent scripts (posttool, memory, failure index, contract check)
        run: python -m compileall scripts/agent/posttool_validator.py scripts/agent/memory_store.py scripts/agent/failure_index.py scripts/agent/contract_check.py scripts/agent/trace_logger.py -q

      - name: API contract snapshot status (no-op when snapshot absent)
        if: hashFiles('.github/agent-platform/openapi.snapshot.json') != ''
        run: python scripts/agent/contract_check.py status

      - name: Validate eval task corpus (regression-detection tasks included)
        run: python evals/run_evals.py --dry-run
