name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python - lint, type, test, security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check src tests scripts/agent

      - name: Import order check (isort)
        run: isort --check-only src tests scripts/agent

      - name: Type check (mypy)
        run: mypy src

      - name: Security scan (bandit)
        run: bandit -r . -x tests/,.venv/ -ll

      - name: Dependency audit (project scoped)
        run: python scripts/agent/check_python_dependency_audit.py

      - name: Tests with coverage
        run: pytest --cov --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml

  node:
    name: Node - lint, type, test, security, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Unit + integration tests
        run: npm run test -- --coverage --coverage.thresholds.lines=80 --coverage.thresholds.branches=80

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: node-coverage
          path: frontend/coverage/

      - name: Build
        run: npm run build

  security-scan:
    name: Static security analysis (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/typescript
            p/react
            p/owasp-top-ten
            p/secrets

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [python, node]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -e .

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          python -m uvicorn biomechanics_ai.collector.server:app --host 127.0.0.1 --port 4318 > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4318/health > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Backend failed readiness probe"
          cat backend.log || true
          exit 1

      - name: Seed demo data
        run: |
          curl -fsS -X DELETE http://127.0.0.1:4318/demo/seed > /dev/null || true
          curl -fsS -X POST http://127.0.0.1:4318/demo/seed

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid

      - name: Wait for frontend readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5173 > /dev/null; then
              echo "Frontend is ready"
              exit 0
            fi
            sleep 1
          done

          echo "Frontend failed readiness probe"
          cat frontend.log || true
          exit 1

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Stop services
        if: always()
        run: |
          if [ -f frontend.pid ]; then
            kill "$(cat frontend.pid)" || true
          fi
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" || true
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload stack logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-stack-logs
          path: |
            backend.log
            frontend.log
          if-no-files-found: warn
          retention-days: 7
