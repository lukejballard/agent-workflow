name: Feature request
description: Propose a new feature or improvement
title: "[Feature] "
labels: ["feature", "needs-spec"]
body:
  - type: markdown
    attributes:
      value: |
        Fill this out completely. The planner agent will use it as input.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who experiences it?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should happen? Keep it outcome-focused, not implementation-focused.
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact estimate
      options:
        - High — blocks users or revenue
        - Medium — significant quality improvement
        - Low — nice to have
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Complexity estimate
      options:
        - S (hours)
        - M (1–2 days)
        - L (3–5 days)
        - XL (needs breakdown)
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List what must be true for this to be considered done.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
